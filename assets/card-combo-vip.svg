<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>
  <line x1="0" y1="0" x2="300" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="150" y1="0" x2="450" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="600" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="450" y1="0" x2="750" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Large crown center -->
  <g transform="translate(300,140)">
    <!-- Crown base -->
    <rect x="-90" y="30" width="180" height="48" rx="6" fill="#C9A84C" fill-opacity="0.1" stroke="#C9A84C" stroke-width="1.8" stroke-opacity="0.6"/>
    <!-- Crown spikes -->
    <polygon points="-90,30 -90,-20 -55,15 -20,-60 15,-20 50,-70 85,-20 90,30"
             fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-width="1.8" stroke-opacity="0.65"/>
    <!-- Gem circles on crown -->
    <circle cx="-55" cy="55" r="7" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="0" cy="55" r="7" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="55" cy="55" r="7" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="-55" cy="55" r="3" fill="#C9A84C" opacity="0.45"/>
    <circle cx="0" cy="55" r="3" fill="#C9A84C" opacity="0.55"/>
    <circle cx="55" cy="55" r="3" fill="#C9A84C" opacity="0.45"/>
    <!-- Top center gem -->
    <circle cx="0" cy="-70" r="10" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-opacity="0.7"/>
    <circle cx="0" cy="-70" r="5" fill="#C9A84C" opacity="0.5"/>
  </g>
  <!-- Stars scattered -->
  <text x="120" y="95" text-anchor="middle" font-family="serif" font-size="16" fill="#C9A84C" opacity="0.2">✦</text>
  <text x="480" y="95" text-anchor="middle" font-family="serif" font-size="16" fill="#C9A84C" opacity="0.2">✦</text>
  <text x="80" y="195" text-anchor="middle" font-family="serif" font-size="11" fill="#C9A84C" opacity="0.15">✦</text>
  <text x="520" y="195" text-anchor="middle" font-family="serif" font-size="11" fill="#C9A84C" opacity="0.15">✦</text>
  <text x="300" y="45" text-anchor="middle" font-family="serif" font-size="13" fill="#C9A84C" opacity="0.18">✦</text>
  <!-- Radiating lines from crown -->
  <line x1="300" y1="70" x2="300" y2="20" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="210" y1="120" x2="165" y2="88" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="390" y1="120" x2="435" y2="88" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Inner shine -->
  <circle cx="300" cy="70" r="100" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.08"/>
  <circle cx="300" cy="70" r="130" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.05"/>
  <rect x="12" y="12" width="576" height="276" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.3"/>
  <path d="M12,12 L12,38 M12,12 L38,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,12 L588,38 M588,12 L562,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M12,288 L12,262 M12,288 L38,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,288 L588,262 M588,288 L562,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <text x="300" y="272" text-anchor="middle" font-family="Georgia,serif" font-size="9" letter-spacing="5" fill="#C9A84C" opacity="0.55">COMBO VIP</text>
  <line x1="160" y1="278" x2="440" y2="278" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
</svg>