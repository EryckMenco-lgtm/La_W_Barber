<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>
  <line x1="0" y1="0" x2="300" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="150" y1="0" x2="450" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="600" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="450" y1="0" x2="750" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Center dividing line -->
  <line x1="300" y1="30" x2="300" y2="260" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="6,4"/>
  <!-- Left: scissors -->
  <g transform="translate(155,148) rotate(-25)">
    <line x1="-70" y1="-50" x2="80" y2="30" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <line x1="-70" y1="50" x2="80" y2="-30" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <circle cx="-5" cy="0" r="9" fill="#C9A84C" opacity="0.8"/>
    <circle cx="-5" cy="0" r="4" fill="#0A0A0A"/>
    <ellipse cx="-70" cy="-50" rx="22" ry="15" fill="none" stroke="#C9A84C" stroke-width="2.5" opacity="0.6"/>
    <ellipse cx="-70" cy="50" rx="22" ry="15" fill="none" stroke="#C9A84C" stroke-width="2.5" opacity="0.6"/>
  </g>
  <!-- Right: straight razor (navaja) -->
  <g transform="translate(445,148) rotate(20)">
    <!-- Handle -->
    <rect x="-20" y="-90" width="40" height="75" rx="8" fill="#151515" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="-14" y="-85" width="28" height="65" rx="5" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Blade pivot -->
    <circle cx="0" cy="-15" r="5" fill="#C9A84C" opacity="0.6"/>
    <!-- Blade -->
    <path d="M-14,-15 L-14,90 Q0,100 14,90 L14,-15 Z" fill="#1E1E1E" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.75"/>
    <line x1="-14" y1="-15" x2="-14" y2="85" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Blade edge shine -->
    <line x1="14" y1="-10" x2="14" y2="88" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.5"/>
  </g>
  <!-- Ornament center top -->
  <text x="300" y="50" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#C9A84C" opacity="0.25">✦</text>
  <!-- Small accent circles -->
  <circle cx="80" cy="80" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="520" cy="80" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="80" cy="220" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="520" cy="220" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <rect x="12" y="12" width="576" height="276" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.3"/>
  <path d="M12,12 L12,38 M12,12 L38,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,12 L588,38 M588,12 L562,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M12,288 L12,262 M12,288 L38,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,288 L588,262 M588,288 L562,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <text x="300" y="272" text-anchor="middle" font-family="Georgia,serif" font-size="9" letter-spacing="5" fill="#C9A84C" opacity="0.55">CORTE + BARBA</text>
  <line x1="160" y1="278" x2="440" y2="278" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
</svg>