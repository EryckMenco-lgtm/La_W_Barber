<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>
  <line x1="0" y1="0" x2="300" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="150" y1="0" x2="450" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="600" y2="300" stroke="#C9A84C" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="450" y1="0" x2="750" y2="300" stroke="#C9A84C" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Eyebrow arch top - prominent -->
  <path d="M80,100 C150,40 260,28 300,35 C340,28 450,40 520,100"
        fill="none" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M100,118 C165,65 262,52 300,58 C338,52 435,65 500,118"
        fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <path d="M125,138 C175,92 264,78 300,84 C336,78 425,92 475,138"
        fill="none" stroke="#C9A84C" stroke-width="1" stroke-linecap="round" stroke-opacity="0.2"/>
  <!-- Diamond focal point at arch peak -->
  <g transform="translate(300,35)">
    <rect x="-10" y="-10" width="20" height="20" fill="#C9A84C" fill-opacity="0.15" stroke="#C9A84C" stroke-width="1.8" stroke-opacity="0.7" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="3.5" fill="#C9A84C" opacity="0.7"/>
  </g>
  <!-- Stylized eye center -->
  <g transform="translate(300,185)">
    <!-- Eye outline -->
    <path d="M-110,0 C-70,-55 70,-55 110,0 C70,55 -70,55 -110,0 Z"
          fill="#0A0A0A" fill-opacity="0.6" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="#C9A84C" fill-opacity="0.08" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.45"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="10" fill="#050505"/>
    <!-- Reflection -->
    <circle cx="-6" cy="-7" r="4" fill="white" opacity="0.12"/>
    <!-- Lashes top -->
    <line x1="-85" y1="-28" x2="-95" y2="-44" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="-55" y1="-46" x2="-60" y2="-64" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="-22" y1="-52" x2="-24" y2="-70" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="22" y1="-52" x2="24" y2="-70" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="55" y1="-46" x2="60" y2="-64" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="85" y1="-28" x2="95" y2="-44" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.4"/>
  </g>
  <!-- Corner dots -->
  <circle cx="80" cy="100" r="2.5" fill="#C9A84C" opacity="0.35"/>
  <circle cx="520" cy="100" r="2.5" fill="#C9A84C" opacity="0.35"/>
  <rect x="12" y="12" width="576" height="276" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.3"/>
  <path d="M12,12 L12,38 M12,12 L38,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,12 L588,38 M588,12 L562,12" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M12,288 L12,262 M12,288 L38,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <path d="M588,288 L588,262 M588,288 L562,288" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <text x="300" y="272" text-anchor="middle" font-family="Georgia,serif" font-size="9" letter-spacing="5" fill="#C9A84C" opacity="0.55">DISEÑO DE CEJAS</text>
  <line x1="160" y1="278" x2="440" y2="278" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
</svg>